name: static-check

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        run: node --check src/app.js

      - name: Validate JSON data
        run: node -e "JSON.parse(require('fs').readFileSync('data/scenarios.json','utf8')); console.log('scenarios ok')"

      - name: Check required files
        run: |
          test -f index.html
          test -f README.md
          test -f LICENSE
          test -f data/monitoring-sample.csv
